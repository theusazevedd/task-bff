# Compose file na raiz do repositório task-bff.
# Builds de ..\outro-repo assumem pastas irmãs em ..\ (ex.: ..\user-service).

services:
  task-scheduler-service:
    build: ..\task-scheduler-service
    container_name: task-scheduler-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/db_agendador
    depends_on:
      - mongo

  task-bff:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task-bff
    ports:
      - "8083:8083"
    environment:
      # Spring relaxed binding: usuario.url, agendador-tarefas.url, notificacao.url
      - USUARIO_URL=http://user-service:8080
      - AGENDADOR_TAREFAS_URL=http://task-scheduler-service:8081
      - NOTIFICACAO_URL=http://notificacao:8082
    depends_on:
      - user-service
      - task-scheduler-service
      - notificacao

  user-service:
    build: ..\user-service
    container_name: user-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/db_usuario
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=admin
    depends_on:
      - postgres

  notificacao:
    build: ..\notification-service
    container_name: notification-service
    ports:
      - "8082:8082"

  postgres:
    image: postgres:latest
    container_name: postgres
    restart: no
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: db_usuario
    ports:
      - "5433:5432"

  mongo:
    image: mongo:latest
    container_name: mongo
    restart: no
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: db_agendador

networks:
  default:
    driver: bridge
